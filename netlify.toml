# SafeNote Netlify routing
# Replace the Render URL below with your actual Render service URL.
# This keeps public traffic under safenote.co.za while the API/app can still run on Render.

[build]
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "https://safenote-kf0j.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/app"
  to = "https://safenote-kf0j.onrender.com/"
  status = 200
  force = true

[[redirects]]
  from = "/app/*"
  to = "https://safenote-kf0j.onrender.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/nhw"
  to = "https://safenote-kf0j.onrender.com/nhw"
  status = 200
  force = true

